# Конфигурация Streamlit для деплоя в Cloud
# https://docs.streamlit.io/library/advanced-features/configuration

[theme]
# Корпоративная палитра Акрон Холдинг: тёмно-синий #001829 + красный #E00613
base = "light"
primaryColor = "#E00613"
backgroundColor = "#F2F5F7"
secondaryBackgroundColor = "#FFFFFF"
textColor = "#001829"
font = "sans serif"

[server]
# Streamlit Cloud сам пробросит порт; для локального запуска оставим default
headless = true
runOnSave = false
# Лимит upload — мы файлы не принимаем, ставим минимум
maxUploadSize = 5

[browser]
# Не собирать статистику
gatherUsageStats = false

[client]
# Скрыть лишние элементы UI
toolbarMode = "minimal"
showErrorDetails = true

[runner]
# Скрипт перезапускается на каждое изменение виджета — стандарт
fastReruns = true
